name: Build and Push Docker Image

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: RinhaNet


jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        run: |
          BRANCH_NAME=${GITHUB_REF_NAME//\//-}
          SHORT_SHA=$(git rev-parse --short HEAD)

          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image_tag=$BRANCH_NAME-$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: "src/RinhaNet.Api/Dockerfile"
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.branch_name }}-latest

      - name: Create summary
        run: |
          IMAGE_1="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}"
          IMAGE_2="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.branch_name }}-latest"

          {
            echo "# Docker Image Published"
            echo ""
            echo "## Images"
            echo ""
            echo "- \`$IMAGE_1\`"
            echo "- \`$IMAGE_2\`"
            echo ""
            echo "## Pull"
            echo ""
            echo '```bash'
            echo "docker pull $IMAGE_1"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY