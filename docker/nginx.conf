user nginx;
worker_processes 1;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}



http {
    server {
        listen 9999;
        location / {
            proxy_pass http://api;
        }
    }

    upstream api {
        server api1:8080;
        server api2:8080;
        keepalive 300;
    }
}